name: CV Baseline CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Python Lambda tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/tests/requirements.txt

      - name: Install backend test dependencies
        run: python -m pip install -r backend/requirements.txt -r backend/tests/requirements.txt

      - name: Run backend tests
        run: python -m pytest backend/tests -ra

  frontend:
    name: React frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up npm
        run: npm install --global npm@11.13.0

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Build frontend
        run: npm --prefix frontend run build

  preview:
    name: Next.js preview lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.20.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install preview dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint preview
        run: pnpm lint:preview

      - name: Build preview
        run: pnpm build:preview

  sam:
    name: SAM validate and build
    needs:
      - backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          version: 1.160.1
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate SAM template
        working-directory: backend
        run: sam validate --lint

      - name: Build SAM application
        working-directory: backend
        run: sam build
